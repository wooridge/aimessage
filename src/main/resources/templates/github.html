<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending - AI Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #24292e 0%, #586069 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .language-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white py-8">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-bold mb-2">🐙 GitHub Trending</h1>
                    <p class="text-white/80 text-lg">热门开源项目推荐</p>
                </div>
                <div class="flex gap-4">
                    <a href="/" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition-colors">
                        ← 返回新闻
                    </a>
                    <button onclick="triggerGitHubSync()" 
                            class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        同步GitHub
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Filter Buttons -->
        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="filterByLanguage('')" class="px-4 py-2 bg-gray-800 text-white rounded-full text-sm hover:bg-gray-700 transition-colors">全部</button>
            <button onclick="filterByLanguage('Python')" class="px-4 py-2 bg-blue-100 text-blue-800 rounded-full text-sm hover:bg-blue-200 transition-colors">Python</button>
            <button onclick="filterByLanguage('Java')" class="px-4 py-2 bg-orange-100 text-orange-800 rounded-full text-sm hover:bg-orange-200 transition-colors">Java</button>
            <button onclick="filterByLanguage('JavaScript')" class="px-4 py-2 bg-yellow-100 text-yellow-800 rounded-full text-sm hover:bg-yellow-200 transition-colors">JavaScript</button>
            <button onclick="filterByLanguage('TypeScript')" class="px-4 py-2 bg-blue-100 text-blue-800 rounded-full text-sm hover:bg-blue-200 transition-colors">TypeScript</button>
            <button onclick="filterByLanguage('Go')" class="px-4 py-2 bg-cyan-100 text-cyan-800 rounded-full text-sm hover:bg-cyan-200 transition-colors">Go</button>
            <button onclick="filterByLanguage('Rust')" class="px-4 py-2 bg-red-100 text-red-800 rounded-full text-sm hover:bg-red-200 transition-colors">Rust</button>
        </div>

        <!-- Projects Grid -->
        <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="project : ${projects}" class="bg-white rounded-xl p-6 shadow-md card-hover border border-gray-100">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-white font-bold"
                             th:text="${#strings.substring(project.owner,0,1).toUpperCase()}">O</div>
                        <div>
                            <h3 class="font-semibold text-gray-800" th:text="${project.name}">Project Name</h3>
                            <p class="text-sm text-gray-500" th:text="${project.owner}">Owner</p>
                        </div>
                    </div>
                    <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded" 
                          th:text="${project.language != null ? project.language : 'Unknown'}">Language</span>
                </div>
                
                <p class="text-gray-600 text-sm mb-3 line-clamp-2" th:text="${project.description}">Description</p>
                
                <!-- 中文简介 -->
                <div class="bg-blue-50 border-l-4 border-blue-400 p-3 mb-4 rounded-r-lg" th:if="${project.descriptionZh != null && !project.descriptionZh.isEmpty()}">
                    <p class="text-sm text-blue-800">
                        <span class="font-semibold">💡 简介：</span>
                        <span th:text="${project.descriptionZh}">中文简介</span>
                    </p>
                </div>
                
                <div class="flex items-center justify-between text-sm text-gray-500">
                    <div class="flex items-center gap-4">
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                            </svg>
                            <span th:text="${#numbers.formatInteger(project.stars, 0, 'COMMA')}">0</span>
                        </span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M7.707 3.293a1 1 0 010 1.414L5.414 7H11a7 7 0 017 7v2a1 1 0 11-2 0v-2a5 5 0 00-5-5H5.414l2.293 2.293a1 1 0 11-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                            <span th:text="${#numbers.formatInteger(project.forks, 0, 'COMMA')}">0</span>
                        </span>
                    </div>
                    <a th:href="${project.url}" target="_blank" 
                       class="text-blue-600 hover:text-blue-800 font-medium">
                        查看 →
                    </a>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${projects == null || projects.isEmpty()}" class="text-center py-16">
            <div class="text-6xl mb-4">📭</div>
            <h3 class="text-xl font-semibold text-gray-600 mb-2">暂无GitHub项目</h3>
            <p class="text-gray-400 mb-4">点击上方"同步GitHub"按钮获取热门项目</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-16 py-8">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>GitHub Trending - 热门开源项目聚合</p>
            <p class="text-xs mt-1">数据来源: GitHub API</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
        <span id="toast-message">同步完成</span>
    </div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        async function triggerGitHubSync() {
            showToast('正在同步GitHub项目...');
            try {
                const response = await fetch('/api/sync/github', { method: 'POST' });
                const result = await response.text();
                showToast(result);
                setTimeout(() => location.reload(), 1500);
            } catch (error) {
                showToast('同步出错: ' + error.message);
            }
        }

        async function filterByLanguage(language) {
            try {
                const url = language ? `/api/github/projects/${language}` : '/api/github/projects';
                const response = await fetch(url);
                const projects = await response.json();
                renderProjects(projects);
            } catch (error) {
                console.error('Error filtering projects:', error);
            }
        }

        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 col-span-full">
                        <div class="text-6xl mb-4">📭</div>
                        <h3 class="text-xl font-semibold text-gray-600 mb-2">暂无项目</h3>
                    </div>
                `;
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="bg-white rounded-xl p-6 shadow-md card-hover border border-gray-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-white font-bold">
                                ${project.owner ? project.owner.charAt(0).toUpperCase() : 'O'}
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">${project.name}</h3>
                                <p class="text-sm text-gray-500">${project.owner}</p>
                            </div>
                        </div>
                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">${project.language || 'Unknown'}</span>
                    </div>
                    <p class="text-gray-600 text-sm mb-3 line-clamp-2">${project.description || ''}</p>
                    ${project.descriptionZh ? `
                    <div class="bg-blue-50 border-l-4 border-blue-400 p-3 mb-4 rounded-r-lg">
                        <p class="text-sm text-blue-800">
                            <span class="font-semibold">💡 简介：</span>
                            ${project.descriptionZh}
                        </p>
                    </div>
                    ` : ''}
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center gap-4">
                            <span class="flex items-center gap-1">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                                </svg>
                                ${project.stars?.toLocaleString() || 0}
                            </span>
                            <span class="flex items-center gap-1">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M7.707 3.293a1 1 0 010 1.414L5.414 7H11a7 7 0 017 7v2a1 1 0 11-2 0v-2a5 5 0 00-5-5H5.414l2.293 2.293a1 1 0 11-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                                ${project.forks?.toLocaleString() || 0}
                            </span>
                        </div>
                        <a href="${project.url}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium">查看 →</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
